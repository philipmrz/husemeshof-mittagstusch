name: Husemeshof Mittagstisch

on:
  schedule:
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  mittagstisch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Speiseplan abrufen und senden
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node husemeshof_github.js
