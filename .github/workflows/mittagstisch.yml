name: Husemeshof Mittagstisch
 
on:
  schedule:
    - cron: '30 9 * * 1-5'  # 11:30 Uhr deutscher Zeit (UTC+2 im Sommer)
  workflow_dispatch:         # Manueller Start per Knopfdruck möglich
 
jobs:
  mittagstisch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
 
      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Speiseplan abrufen und senden
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node husemeshof.js
 
